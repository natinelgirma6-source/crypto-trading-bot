name: Telegram Test
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          GET_ME=$(curl -s "https://api.telegram.org/bot${TELEGRAM_TOKEN}/getMe")
          SEND=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"TEST: Crypto bot connectivity check\"}")
          git config user.email "bot@test.com"
          git config user.name "Bot"
          echo "getMe=$GET_ME" > telegram_test_result.txt
          echo "sendMessage=$SEND" >> telegram_test_result.txt
          git add telegram_test_result.txt
          git commit -m "test: telegram result"
          git push
